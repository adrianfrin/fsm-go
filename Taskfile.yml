version: '3'

tasks:
  check:
    desc: Run all local checks
    cmds:
      - task: fmt:check
      - task: tidy:check
      - task: vet
      - task: lint
      - task: test
      - task: test:race
      - task: test:integration
      - task: test:benchmark

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:race:
    desc: Run tests with race detector
    cmds:
      - go test -race ./...

  test:integration:
    desc: Run integration tests with Testcontainers
    cmds:
      - go test -count=1 -tags=integration ./test/integration/...

  test:benchmark:
    desc: Run 100K transition benchmark once
    cmds:
      - go test -run '^$' -bench BenchmarkRuntimeFire100K -benchtime=1x -benchmem ./test/benchmark

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  tidy:check:
    desc: Check go.mod and go.sum are tidy
    cmds:
      - |
        tmp="$(mktemp -d)"
        cp go.mod go.sum "$tmp"/
        go mod tidy
        diff -u "$tmp/go.mod" go.mod
        diff -u "$tmp/go.sum" go.sum

  fmt:check:
    desc: Check formatting
    cmds:
      - test -z "$(gofmt -l .)"

  demo:up:
    desc: Start demo service and dependencies
    cmds:
      - docker compose up -d --build

  demo:down:
    desc: Stop demo service and dependencies
    cmds:
      - docker compose down -v
