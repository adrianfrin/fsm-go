machine: agent_run
version: v1
initial: DRAFT

states:
  - name: DRAFT
  - name: PLANNING
  - name: RUNNING
  - name: WAITING_TOOL
  - name: RETRY
  - name: FINISHED
    terminal: true
  - name: FAILED
    terminal: true

events:
  - name: SUBMIT
  - name: PLAN_DONE
  - name: NEED_TOOL
  - name: TOOL_DONE
  - name: TOOL_FAILED
  - name: RETRY
  - name: FINISH
  - name: FAIL

transitions:
  - name: submit
    from: DRAFT
    event: SUBMIT
    to: PLANNING
    priority: 10

  - name: plan_done
    from: PLANNING
    event: PLAN_DONE
    to: RUNNING
    priority: 10

  - name: need_tool
    from: RUNNING
    event: NEED_TOOL
    to: WAITING_TOOL
    priority: 10

  - name: tool_done
    from: WAITING_TOOL
    event: TOOL_DONE
    to: RUNNING
    priority: 10

  - name: tool_failed_retry
    from: WAITING_TOOL
    event: TOOL_FAILED
    to: RETRY
    priority: 20
    guard: "entity.retryCount < 3"

  - name: tool_failed_fail
    from: WAITING_TOOL
    event: TOOL_FAILED
    to: FAILED
    priority: 10
    guard: "entity.retryCount >= 3"

  - name: retry
    from: RETRY
    event: RETRY
    to: RUNNING
    priority: 10

  - name: finish
    from: RUNNING
    event: FINISH
    to: FINISHED
    priority: 10

  - name: fail
    from: RUNNING
    event: FAIL
    to: FAILED
    priority: 10
