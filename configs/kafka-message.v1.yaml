machine: kafka_message
version: v1
initial: PENDING

states:
  - name: PENDING
  - name: RUNNING
  - name: RETRY
  - name: SUCCESS
    terminal: true
  - name: DEAD_LETTER
    terminal: true

events:
  - name: START
  - name: SUCCESS
  - name: FAIL
  - name: RETRY

transitions:
  - name: start
    from: PENDING
    event: START
    to: RUNNING
    priority: 10

  - name: success
    from: RUNNING
    event: SUCCESS
    to: SUCCESS
    priority: 10

  - name: retry
    from: RUNNING
    event: FAIL
    to: RETRY
    priority: 20
    guard: "entity.retryCount < 3"
    actions:
      in_tx:
        - outbox.kafka_retry

  - name: dead_letter
    from: RUNNING
    event: FAIL
    to: DEAD_LETTER
    priority: 10
    guard: "entity.retryCount >= 3"
    actions:
      in_tx:
        - outbox.kafka_dead_letter

  - name: retry_start
    from: RETRY
    event: RETRY
    to: RUNNING
    priority: 10
