machine: order
version: v1
initial: PENDING

states:
  - name: PENDING
  - name: PAID
  - name: SHIPPED
  - name: COMPLETED
    terminal: true
  - name: CANCELLED
    terminal: true

events:
  - name: PAY_SUCCESS
  - name: SHIP
  - name: FINISH
  - name: CANCEL

transitions:
  - name: pay_success
    from: PENDING
    event: PAY_SUCCESS
    to: PAID
    priority: 10
    guard: "payload.paymentStatus == 'SUCCESS' && payload.amount > 0"
    idempotent: true
    actions:
      in_tx:
        - outbox.order_paid

  - name: ship
    from: PAID
    event: SHIP
    to: SHIPPED
    priority: 10
    guard: "actor.role == 'admin' || actor.role == 'ops'"
    idempotent: true
    actions:
      in_tx:
        - outbox.order_shipped

  - name: finish
    from: SHIPPED
    event: FINISH
    to: COMPLETED
    priority: 10
    idempotent: true
    actions:
      in_tx:
        - outbox.order_completed

  - name: cancel_pending
    from: PENDING
    event: CANCEL
    to: CANCELLED
    priority: 10
    guard: "actor.role in ['admin', 'customer']"
    idempotent: true
    actions:
      in_tx:
        - outbox.order_cancelled
