services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fsm_demo
      MYSQL_USER: fsm
      MYSQL_PASSWORD: fsm
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  fsm-demo:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FSM_MYSQL_DSN: fsm:fsm@tcp(mysql:3306)/fsm_demo?parseTime=true
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  mysql_data:
